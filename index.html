<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>환율트래커</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="환율트래커">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230B1220'/%3E%3Ctext x='50' y='66' font-size='52' text-anchor='middle' fill='%2334D399' font-family='monospace' font-weight='bold'%3E$%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230B1220'/%3E%3Ctext x='50' y='66' font-size='52' text-anchor='middle' fill='%2334D399' font-family='monospace' font-weight='bold'%3E$%3C/text%3E%3C/svg%3E">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>
  :root{
    --bg:#0B1220; --bg-elevated:#101B30; --line:#1E2C45;
    --text:#E7ECF3; --muted:#7C8AA3; --green:#34D399; --orange:#FB923C; --gold:#D4AF6A;
    --mono:'SF Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Inter','Pretendard',sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;}
  body{padding-bottom:env(safe-area-inset-bottom);}

  header{position:sticky; top:0; z-index:10; padding:calc(env(safe-area-inset-top) + 14px) 18px 0;
    background:linear-gradient(180deg,var(--bg) 80%, transparent); border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:baseline; justify-content:space-between;}
  .brand h1{font-size:15px; font-weight:600; letter-spacing:.02em; margin:0; color:var(--muted);}
  .brand .clock{font-family:var(--mono); font-size:11px; color:var(--muted);}

  .ccy-tabs{display:flex; gap:6px; margin-top:12px;}
  .ccy-tabs button{flex:1; background:var(--bg-elevated); border:1px solid var(--line); color:var(--muted);
    border-radius:9px; padding:8px 0; font-family:var(--sans); font-weight:700; font-size:13px;}
  .ccy-tabs button.active{background:rgba(52,211,153,.14); border-color:var(--green); color:var(--green);}

  .ticker{display:flex; align-items:flex-end; gap:10px; margin:12px 0 12px;}
  .ticker .rate{font-family:var(--mono); font-size:40px; font-weight:700; letter-spacing:-0.02em; line-height:1;}
  .ticker .unit{font-size:12px; color:var(--muted); margin-bottom:6px;}
  .delta{font-family:var(--mono); font-size:13px; padding:3px 8px; border-radius:6px; margin-bottom:6px;}
  .delta.up{color:var(--orange); background:rgba(251,146,60,.12);}
  .delta.down{color:var(--green); background:rgba(52,211,153,.12);}

  main{padding:18px; max-width:480px; margin:0 auto;}
  section{margin-bottom:22px;}
  .card{background:var(--bg-elevated); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .label{font-size:11px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:10px;}

  .gap-wrap{display:flex; align-items:center; gap:14px;}
  .gap-meter{position:relative; flex:1; height:8px; border-radius:99px; background:var(--line); overflow:hidden;}
  .gap-fill{position:absolute; top:0; bottom:0; border-radius:99px; transition:width .4s ease, left .4s ease;}
  .gap-fill.favor{background:var(--green);}
  .gap-fill.unfavor{background:var(--orange);}
  .gap-mid{position:absolute; left:50%; top:-4px; bottom:-4px; width:1px; background:var(--muted); opacity:.5;}
  .gap-num{font-family:var(--mono); font-size:20px; font-weight:700; min-width:64px; text-align:right;}
  .gap-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-top:1px solid var(--line);}
  .gap-row:first-of-type{border-top:none;}
  .gap-row .name{font-size:13px; color:var(--text);}
  .badge{font-family:var(--mono); font-size:12px; font-weight:700; padding:2px 8px; border-radius:5px;}
  .badge.o{color:var(--green); background:rgba(52,211,153,.14);}
  .badge.x{color:var(--orange); background:rgba(251,146,60,.14);}

  canvas{width:100% !important; height:200px !important;}

  nav.tabs{position:sticky; bottom:0; display:flex; background:var(--bg-elevated);
    border-top:1px solid var(--line); padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);}
  nav.tabs button{flex:1; background:none; border:none; color:var(--muted); font-family:var(--sans);
    font-size:11px; padding:8px 0; display:flex; flex-direction:column; align-items:center; gap:4px;}
  nav.tabs button .ic{font-size:18px;}
  nav.tabs button.active{color:var(--green);}

  .view{display:none;} .view.active{display:block;}

  .form-row{display:flex; gap:8px; margin-bottom:8px;}
  input,select{background:var(--bg); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:10px; font-family:var(--mono); font-size:14px; width:100%;}
  button.primary{width:100%; padding:12px; background:var(--green); color:#06281D; font-weight:700;
    border:none; border-radius:10px; font-size:14px; margin-top:6px;}
  button.ghost{background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:6px 10px; font-size:12px;}
  button.fillrate{background:transparent; border:1px solid var(--line); color:var(--gold); border-radius:8px; padding:0 10px; font-family:var(--mono); font-size:12px; white-space:nowrap;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; color:var(--muted); font-size:11px; padding:6px 4px; border-bottom:1px solid var(--line);}
  td{padding:8px 4px; border-bottom:1px solid var(--line); font-family:var(--mono);}
  td.buy{color:var(--orange);} td.sell{color:var(--green);}

  .summary-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .summary-grid .stat{background:var(--bg); border-radius:10px; padding:12px;}
  .summary-grid .stat .v{font-family:var(--mono); font-size:17px; font-weight:700;}
  .summary-grid .stat .l{font-size:11px; color:var(--muted); margin-top:2px;}

  .empty{text-align:center; color:var(--muted); font-size:13px; padding:24px 0;}

  .bank-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;}
  .bank-stat{background:var(--bg); border-radius:10px; padding:12px;}
  .bank-stat .v{font-family:var(--mono); font-size:18px; font-weight:700;}
  .bank-stat .l{font-size:11px; color:var(--muted); margin-top:2px;}
  .bank-stat.buy .v{color:var(--orange);}
  .bank-stat.sell .v{color:var(--green);}
  .spread-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0 0; border-top:1px solid var(--line); margin-top:4px;}
  .spread-row .name{font-size:12px; color:var(--muted);}
  .spread-row .v{font-family:var(--mono); font-size:15px; font-weight:700; color:var(--gold);}
  .toast{position:fixed; left:50%; bottom:90px; transform:translateX(-50%); background:var(--gold); color:#241B07;
    padding:10px 16px; border-radius:10px; font-size:13px; font-weight:600; opacity:0; transition:opacity .3s; z-index:99; max-width:86%; text-align:center;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1 id="ccyTitle">USD · KRW</h1>
    <span class="clock" id="clock">--:--</span>
  </div>
  <div class="ccy-tabs">
    <button class="active" data-ccy="USD" onclick="switchCcy('USD')">달러</button>
    <button data-ccy="JPY" onclick="switchCcy('JPY')">엔화</button>
    <button data-ccy="CNY" onclick="switchCcy('CNY')">위안화</button>
  </div>
  <div class="ticker">
    <span class="unit" id="rateUnit">1달러 ₩</span>
    <span class="rate" id="rateMain">----.--</span>
    <span class="delta" id="rateDelta">·</span>
  </div>
</header>

<main>

  <section class="view active" id="view-rate">
    <div class="card" style="margin-bottom:14px;">
      <div class="label">매수 적합성 — 평균 대비 갭</div>
      <div id="gapRows"></div>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="label">90일 추이</div>
      <canvas id="chart"></canvas>
    </div>
    <div class="card">
      <div class="label">은행 환전 고시 (수출입은행 기준) <span id="bankAsOf" style="color:var(--muted); text-transform:none; font-weight:400;"></span></div>
      <div id="bankRateBox"><div class="empty">불러오는 중...</div></div>
    </div>
  </section>

  <section class="view" id="view-trade">
    <div class="card" style="margin-bottom:14px;">
      <div class="label" id="sumLabel">평가 현황 — 달러</div>
      <div class="summary-grid">
        <div class="stat"><div class="v" id="sumHold">0</div><div class="l" id="sumHoldLabel">보유 외화</div></div>
        <div class="stat"><div class="v" id="sumAvgRate">-</div><div class="l">평균 매수환율</div></div>
        <div class="stat"><div class="v" id="sumInvestKrw">₩0</div><div class="l">투입 원화</div></div>
        <div class="stat"><div class="v" id="sumPnl">₩0</div><div class="l">평가손익</div></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="label">기록 추가</div>
      <div class="form-row">
        <select id="tType"><option value="buy">매수</option><option value="sell">매도</option></select>
        <input type="date" id="tDate">
      </div>
      <div class="form-row">
        <input type="number" id="tAmt" placeholder="외화 금액">
        <input type="number" id="tRate" placeholder="환율 (1단위당 ₩)" step="0.0001">
        <button class="fillrate" onclick="fillCurrentRate()">현재가</button>
      </div>
      <button class="primary" onclick="addTrade()">기록 저장</button>
    </div>

    <div class="card">
      <div class="label">매매 내역</div>
      <div id="tradeTableWrap"><div class="empty">아직 기록이 없어요</div></div>
    </div>
  </section>

  <section class="view" id="view-alert">
    <div class="card" style="margin-bottom:14px;">
      <div class="label" id="alertLabel">목표 환율 알림 — 달러</div>
      <div class="form-row">
        <input type="number" id="alertRate" placeholder="목표 환율 (1단위당 ₩)" step="0.0001">
        <select id="alertDir"><option value="below">이하로 떨어지면</option><option value="above">이상으로 오르면</option></select>
      </div>
      <button class="primary" onclick="saveAlert()">알림 설정 저장</button>
      <p style="font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5;">
        앱을 열어둔 상태에서만 동작해요. 브라우저 알림 권한을 허용하면 백그라운드에서도 알림이 떠요. 통화별로 각각 설정돼요.
      </p>
    </div>
    <div class="card" id="alertStatus" style="display:none;">
      <div class="label">현재 설정</div>
      <p id="alertText" style="font-family:var(--mono); font-size:14px;"></p>
      <button class="ghost" onclick="clearAlert()">알림 해제</button>
    </div>
  </section>

</main>

<nav class="tabs">
  <button class="active" data-view="view-rate"><span class="ic">📈</span>환율</button>
  <button data-view="view-trade"><span class="ic">📒</span>매매기록</button>
  <button data-view="view-alert"><span class="ic">🔔</span>알림</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);

const CCY = {
  USD: { name:'달러', symbol:'$', unitLabel:'1달러 ₩', mult:1, decimals:2 },
  JPY: { name:'엔화', symbol:'¥', unitLabel:'100엔 ₩', mult:100, decimals:2 },
  CNY: { name:'위안화', symbol:'¥', unitLabel:'1위안 ₩', mult:1, decimals:2 },
};
let currentCcy = 'USD';
let ratesData = {}; // { USD: {labels, values, current, prev, avg60, avg120}, ... }
let chartInstance = null;

/* ---------- 탭 전환 (하단 네비) ---------- */
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    $(btn.dataset.view).classList.add('active');
  });
});

/* ---------- 통화 전환 ---------- */
function switchCcy(ccy){
  currentCcy = ccy;
  document.querySelectorAll('.ccy-tabs button').forEach(b=>b.classList.toggle('active', b.dataset.ccy===ccy));
  const meta = CCY[ccy];
  $('ccyTitle').textContent = `${ccy} · KRW`;
  $('rateUnit').textContent = meta.unitLabel;
  $('sumLabel').textContent = `평가 현황 — ${meta.name}`;
  $('sumHoldLabel').textContent = `보유 ${meta.name}`;
  $('alertLabel').textContent = `목표 환율 알림 — ${meta.name}`;
  renderFromCache();
  renderTrades();
  renderAlertStatus();
  renderBankRates();
}

/* ---------- 시계 ---------- */
function tickClock(){ $('clock').textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
setInterval(tickClock, 1000); tickClock();

/* ---------- 토스트 ---------- */
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

/* ---------- 환율 데이터: api.frankfurter.dev, base=KRW로 한 번에 3개 통화 ---------- */
function fmtDate(d){ return d.toISOString().slice(0,10); }
function average(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }

let lastLive = {}; // 직전 poll 값 (실시간 변동 표시용)

// 차트/60·120일 평균용 — 일별 데이터라 자주 안 바뀌어도 정상
async function loadHistorical(){
  try{
    const today = new Date();
    const start = new Date(); start.setDate(start.getDate()-130);
    const url = `https://api.frankfurter.dev/v1/${fmtDate(start)}..${fmtDate(today)}?base=KRW&symbols=USD,JPY,CNY`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const entries = Object.entries(data.rates).sort((a,b)=> a[0] < b[0] ? -1 : 1);
    const labels = entries.map(e => e[0].slice(5));

    ['USD','JPY','CNY'].forEach(ccy=>{
      const values = entries.map(e => 1 / e[1][ccy]);
      if (!ratesData[ccy]) ratesData[ccy] = {};
      ratesData[ccy].labels = labels;
      ratesData[ccy].values = values;
      ratesData[ccy].avg60 = average(values.slice(-60));
      ratesData[ccy].avg120 = average(values.slice(-120));
      if (ratesData[ccy].current === undefined) ratesData[ccy].current = values[values.length-1];
      if (ratesData[ccy].prev === undefined) ratesData[ccy].prev = values[values.length-2] ?? values[values.length-1];
    });
    renderFromCache();
  }catch(e){
    console.error('차트 데이터 로딩 실패:', e);
  }
}

// 시간당 갱신되는 실시간성 시세 — 티커/딜타/알림 체크용
async function loadLive(){
  try{
    const res = await fetch('https://api.exchangerate.fun/latest?base=USD');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const r = data.rates;
    const live = { USD: r.KRW, JPY: r.KRW / r.JPY, CNY: r.KRW / r.CNY };

    ['USD','JPY','CNY'].forEach(ccy=>{
      if (!ratesData[ccy]) ratesData[ccy] = {};
      ratesData[ccy].prev = (lastLive[ccy] !== undefined) ? lastLive[ccy] : live[ccy];
      ratesData[ccy].current = live[ccy];
      checkAlert(ccy, live[ccy]);
    });
    lastLive = live;
    renderFromCache();
  }catch(e){
    console.error('실시간 시세 로딩 실패:', e);
    if (ratesData[currentCcy] === undefined || ratesData[currentCcy].current === undefined){
      $('rateMain').textContent = '오류';
      toast('실시간 시세를 불러오지 못했어요 (' + e.message + ')');
    }
  }
}

function renderFromCache(){
  const d = ratesData[currentCcy];
  if (!d) return;
  const meta = CCY[currentCcy];
  renderTicker(d.current, d.prev, meta);
  renderGap(d.current, d.avg60, d.avg120, meta);
  renderChart(d.labels.slice(-90), d.values.slice(-90), d.avg60, meta);
  renderSummary(getTrades().filter(t=>t.ccy===currentCcy));
}

function renderTicker(current, prev, meta){
  $('rateMain').textContent = (current*meta.mult).toFixed(meta.decimals);
  const diff = (current - prev) * meta.mult;
  const el = $('rateDelta');
  if (diff >= 0){ el.textContent = `▲ ${diff.toFixed(meta.decimals)}`; el.className = 'delta up'; }
  else { el.textContent = `▼ ${Math.abs(diff).toFixed(meta.decimals)}`; el.className = 'delta down'; }
}

function renderGap(current, a60, a120, meta){
  const rows = [{name:'60일 평균', avg:a60}, {name:'120일 평균', avg:a120}];
  $('gapRows').innerHTML = rows.map(r=>{
    const gap = ((current - r.avg) / r.avg) * 100;
    const favor = gap <= 0;
    const pct = Math.max(-100, Math.min(100, gap * 8));
    const fillStyle = pct >= 0 ? `left:50%; width:${Math.abs(pct)/2}%;` : `left:${50 - Math.abs(pct)/2}%; width:${Math.abs(pct)/2}%;`;
    return `
      <div class="gap-row">
        <div style="flex:1;">
          <div class="name">${r.name} (₩${(r.avg*meta.mult).toFixed(meta.decimals)})</div>
          <div class="gap-wrap" style="margin-top:6px;">
            <div class="gap-meter"><div class="gap-mid"></div><div class="gap-fill ${favor?'favor':'unfavor'}" style="${fillStyle}"></div></div>
          </div>
        </div>
        <div style="text-align:right; margin-left:14px;">
          <div class="gap-num" style="color:${favor?'var(--green)':'var(--orange)'}">${gap>0?'+':''}${gap.toFixed(2)}%</div>
          <span class="badge ${favor?'o':'x'}">${favor?'O 매수유리':'X 매수불리'}</span>
        </div>
      </div>`;
  }).join('');
}

function renderChart(labels, values, avg, meta){
  const ctx = $('chart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets:[
      { data:values.map(v=>v*meta.mult), borderColor:'#34D399', borderWidth:2, pointRadius:0, tension:.25, fill:false },
      { data:labels.map(()=>avg*meta.mult), borderColor:'#7C8AA3', borderWidth:1, borderDash:[4,4], pointRadius:0 }
    ]},
    options:{ plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#7C8AA3', maxTicksLimit:6, font:{size:10}}, grid:{color:'#1E2C45'}},
        y:{ticks:{color:'#7C8AA3', font:{size:10}}, grid:{color:'#1E2C45'}}
      }
    }
  });
}

/* ---------- 매매기록 (통화별, localStorage) ---------- */
function getTrades(){ return JSON.parse(localStorage.getItem('dt_trades_v2') || '[]'); }
function setTrades(t){ localStorage.setItem('dt_trades_v2', JSON.stringify(t)); }

function fillCurrentRate(){
  const d = ratesData[currentCcy];
  if (!d){ toast('환율을 아직 불러오는 중이에요'); return; }
  $('tRate').value = d.current.toFixed(4);
}

function addTrade(){
  const type = $('tType').value;
  const date = $('tDate').value || fmtDate(new Date());
  const amt = parseFloat($('tAmt').value);
  const rate = parseFloat($('tRate').value);
  if (!amt || !rate){ toast('금액과 환율을 입력해주세요'); return; }
  const trades = getTrades();
  trades.push({ccy:currentCcy, type, date, amt, rate, krw: amt*rate});
  setTrades(trades);
  $('tAmt').value=''; $('tRate').value='';
  renderTrades();
  toast('기록을 저장했어요');
}

function deleteTradeById(id){
  setTrades(getTrades().filter(t=>t.id!==id));
  renderTrades();
}

function renderTrades(){
  const all = getTrades();
  // 이전 기록에 id가 없으면 부여 (마이그레이션)
  let changed = false;
  all.forEach(t=>{ if(!t.id){ t.id = Math.random().toString(36).slice(2); changed = true; } });
  if (changed) setTrades(all);

  const trades = all.filter(t=>t.ccy===currentCcy).sort((a,b)=> a.date < b.date ? 1 : -1);
  const wrap = $('tradeTableWrap');
  const meta = CCY[currentCcy];
  if (trades.length === 0){
    wrap.innerHTML = '<div class="empty">아직 기록이 없어요</div>';
  } else {
    wrap.innerHTML = `<table>
      <tr><th>날짜</th><th>구분</th><th>금액</th><th>환율</th><th></th></tr>
      ${trades.map(t=>`
        <tr>
          <td>${t.date}</td>
          <td class="${t.type}">${t.type==='buy'?'매수':'매도'}</td>
          <td>${meta.symbol}${t.amt.toLocaleString()}</td>
          <td>₩${t.rate.toFixed(4)}</td>
          <td><span class="ghost" style="cursor:pointer;" onclick="deleteTradeById('${t.id}')">✕</span></td>
        </tr>`).join('')}
    </table>`;
  }
  renderSummary(trades);
}

function renderSummary(trades){
  const meta = CCY[currentCcy];
  const buys = trades.filter(t=>t.type==='buy');
  const sells = trades.filter(t=>t.type==='sell');
  const buyAmt = buys.reduce((a,t)=>a+t.amt,0);
  const sellAmt = sells.reduce((a,t)=>a+t.amt,0);
  const buyKrw = buys.reduce((a,t)=>a+t.krw,0);
  const holdAmt = buyAmt - sellAmt;
  const avgRate = buyAmt ? (buyKrw/buyAmt) : 0;
  const sellMatchedKrw = sellAmt * avgRate;
  const investKrw = buyKrw - sellMatchedKrw;
  const liveRate = (ratesData[currentCcy] && ratesData[currentCcy].current) || avgRate;
  const currentValueKrw = holdAmt * liveRate;
  const pnl = currentValueKrw - investKrw;

  $('sumHold').textContent = `${meta.symbol}${holdAmt.toLocaleString(undefined,{maximumFractionDigits:2})}`;
  $('sumAvgRate').textContent = avgRate ? `₩${avgRate.toFixed(4)}` : '-';
  $('sumInvestKrw').textContent = `₩${Math.round(investKrw).toLocaleString()}`;
  const pnlEl = $('sumPnl');
  pnlEl.textContent = `${pnl>=0?'+':''}₩${Math.round(pnl).toLocaleString()}`;
  pnlEl.style.color = pnl>=0 ? 'var(--green)' : 'var(--orange)';
}

/* ---------- 알림 (통화별) ---------- */
function getAlerts(){ return JSON.parse(localStorage.getItem('dt_alerts_v2') || '{}'); }
function setAlerts(a){ localStorage.setItem('dt_alerts_v2', JSON.stringify(a)); }

function saveAlert(){
  const rate = parseFloat($('alertRate').value);
  const dir = $('alertDir').value;
  if (!rate){ toast('목표 환율을 입력해주세요'); return; }
  const alerts = getAlerts();
  alerts[currentCcy] = {rate, dir, fired:false};
  setAlerts(alerts);
  if ('Notification' in window && Notification.permission === 'default'){ Notification.requestPermission(); }
  renderAlertStatus();
  toast('알림을 설정했어요');
}
function clearAlert(){
  const alerts = getAlerts();
  delete alerts[currentCcy];
  setAlerts(alerts);
  renderAlertStatus();
}
function renderAlertStatus(){
  const a = getAlerts()[currentCcy];
  const box = $('alertStatus');
  if (!a){ box.style.display='none'; return; }
  box.style.display='block';
  $('alertText').textContent = `₩${a.rate} ${a.dir==='below'?'이하로 떨어지면':'이상으로 오르면'} 알림 (${CCY[currentCcy].name})`;
}
function checkAlert(ccy, current){
  const alerts = getAlerts();
  const a = alerts[ccy];
  if (!a || a.fired) return;
  const hit = a.dir==='below' ? current <= a.rate : current >= a.rate;
  if (hit){
    toast(`🔔 ${CCY[ccy].name} 목표 환율 도달! 현재 ₩${current.toFixed(4)}`);
    if ('Notification' in window && Notification.permission === 'granted'){
      new Notification('환율트래커', {body:`${CCY[ccy].name} 목표 환율(₩${a.rate}) 도달! 현재 ₩${current.toFixed(4)}`});
    }
    a.fired = true;
    setAlerts(alerts);
  }
}

/* ---------- 은행 환전 고시 (한국수출입은행 OpenAPI) ---------- */
const EXIM_AUTHKEY = 'bVbvJzrUXlEeeo63X1ETiUVB5hOqanKt';
const EXIM_CCY_MAP = { USD:['USD'], JPY:['JPY(100)'], CNY:['CNH','CNY'] };
let bankData = {}; // { USD: {ttb, tts, deal_bas_r}, ... }

function eximUrl(dateStr){
  return `https://oapi.koreaexim.go.kr/site/program/financial/exchangeJSON?authkey=${EXIM_AUTHKEY}&searchdate=${dateStr}&data=AP01`;
}
function toNum(s){ return parseFloat(String(s).replace(/,/g,'')); }

async function fetchExim(dateStr){
  const direct = eximUrl(dateStr);
  try{
    const res = await fetch(direct);
    if (!res.ok) throw new Error('HTTP '+res.status);
    return await res.json();
  }catch(e){
    // CORS 등으로 직접 호출 실패 시 무료 중계 프록시로 재시도
    const proxied = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(direct);
    const res2 = await fetch(proxied);
    if (!res2.ok) throw new Error('proxy HTTP '+res2.status);
    return await res2.json();
  }
}

async function loadBankRates(){
  try{
    let d = new Date();
    let json = null;
    for (let i=0; i<6; i++){
      const dateStr = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      const data = await fetchExim(dateStr);
      if (Array.isArray(data) && data.length > 0 && data[0].result === 1){
        json = data; bankAsOfDate = dateStr; break;
      }
      d.setDate(d.getDate()-1); // 결과 없으면(주말/휴일) 하루 전으로
    }
    if (!json){ throw new Error('최근 거래일 데이터 없음'); }

    ['USD','JPY','CNY'].forEach(ccy=>{
      const row = json.find(r => EXIM_CCY_MAP[ccy].includes(r.cur_unit));
      if (row){
        bankData[ccy] = { ttb: toNum(row.ttb), tts: toNum(row.tts), base: toNum(row.deal_bas_r) };
      }
    });
    $('bankAsOf').textContent = bankAsOfDate ? `(${bankAsOfDate.slice(0,4)}.${bankAsOfDate.slice(4,6)}.${bankAsOfDate.slice(6,8)} 고시)` : '';
    renderBankRates();
  }catch(e){
    console.error('은행 환율 로딩 실패:', e);
    $('bankRateBox').innerHTML = `<div class="empty">은행 환율을 불러오지 못했어요<br><span style="font-size:11px;">${e.message}</span></div>`;
  }
}
let bankAsOfDate = null;

function renderBankRates(){
  const b = bankData[currentCcy];
  const box = $('bankRateBox');
  if (!b){ box.innerHTML = '<div class="empty">해당 통화 데이터가 없어요</div>'; return; }
  const spread = b.tts - b.ttb;
  const spreadPct = (spread / b.base) * 100;
  box.innerHTML = `
    <div class="bank-grid">
      <div class="bank-stat buy"><div class="v">₩${b.tts.toFixed(2)}</div><div class="l">살 때 (보내실 때)</div></div>
      <div class="bank-stat sell"><div class="v">₩${b.ttb.toFixed(2)}</div><div class="l">팔 때 (받으실 때)</div></div>
    </div>
    <div class="bank-grid" style="grid-template-columns:1fr;">
      <div class="bank-stat"><div class="v" style="color:var(--text);">₩${b.base.toFixed(2)}</div><div class="l">매매기준율</div></div>
    </div>
    <div class="spread-row">
      <span class="name">스프레드 (살때-팔때)</span>
      <span class="v">₩${spread.toFixed(2)} (${spreadPct.toFixed(2)}%)</span>
    </div>
    <p style="font-size:11px; color:var(--muted); margin:10px 0 0; line-height:1.5;">
      전신환(송금) 기준이에요. 영업점 현찰 환전은 스프레드가 더 넓을 수 있어요.
    </p>`;
}
